<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <linearGradient id="hookGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sparkGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background (transparent — works on dark bg) -->

  <!-- H -->
  <text x="0" y="62"
    font-family="'Arial Black', 'Impact', sans-serif"
    font-weight="900"
    font-size="68"
    letter-spacing="-2"
    fill="#F8FAFC">H</text>

  <!-- O — drawn manually as a circle with spark inside -->
  <!-- O outline -->
  <ellipse cx="105" cy="38" rx="28" ry="32"
    fill="none"
    stroke="#F8FAFC"
    stroke-width="8"/>

  <!-- Spark / trending chart inside O -->
  <polyline
    points="89,50 97,38 105,44 113,26 121,32"
    fill="none"
    stroke="url(#sparkGrad)"
    stroke-width="3.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#glow)"/>

  <!-- Dot at top of spark -->
  <circle cx="121" cy="32" r="3" fill="#06B6D4" filter="url(#glow)"/>

  <!-- K -->
  <text x="137" y="62"
    font-family="'Arial Black', 'Impact', sans-serif"
    font-weight="900"
    font-size="68"
    letter-spacing="-2"
    fill="#F8FAFC">K</text>

  <!-- Tagline -->
  <text x="2" y="76"
    font-family="'Arial', sans-serif"
    font-weight="400"
    font-size="10"
    letter-spacing="3"
    fill="#94A3B8">STOP THUMBS. START FUNNELS.</text>

</svg>
